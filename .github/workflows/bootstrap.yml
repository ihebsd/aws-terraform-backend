name: Terraform Bootstrap (local state cached)

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Nom projet/client (sert pour la clé du cache)"
        required: true
        type: string
      region:
        description: "AWS region"
        required: true
        default: "eu-west-1"
        type: string
      bucket_name:
        description: "S3 bucket name (unique globalement)"
        required: true
        type: string
      dynamodb_table_name:
        description: "DynamoDB table name"
        required: true
        default: "terraform-locks"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ inputs.region }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.14.0

    # ✅ Restore local state between runs (pas un backend remote Terraform)
    - name: Restore Terraform local state (cache)
      uses: actions/cache@v4
      with:
        path: |
          terraform.tfstate
          terraform.tfstate.backup
          .terraform
        key: tfstate-${{ inputs.project }}-${{ inputs.region }}

    - name: Terraform init (NO remote backend)
      run: terraform init -backend=false -input=false

    - name: Terraform plan
      run: |
        terraform plan -input=false \
          -var="region=${{ inputs.region }}" \
          -var="bucket_name=${{ inputs.bucket_name }}" \
          -var="dynamodb_table_name=${{ inputs.dynamodb_table_name }}"

    - name: Terraform apply
      run: |
        terraform apply -auto-approve -input=false \
          -var="region=${{ inputs.region }}" \
          -var="bucket_name=${{ inputs.bucket_name }}" \
          -var="dynamodb_table_name=${{ inputs.dynamodb_table_name }}"

    # ✅ Save updated state back to cache automatically (same key)
    - name: Save Terraform local state (cache)
      uses: actions/cache@v4
      with:
        path: |
          terraform.tfstate
          terraform.tfstate.backup
          .terraform
        key: tfstate-${{ inputs.project }}-${{ inputs.region }}

    - name: Show outputs
      run: terraform show -no-color
